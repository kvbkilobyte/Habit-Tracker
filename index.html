<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habt — Daily Habit Tracker</title>

  <!-- Inter: clean, modern SaaS workhorse for body text -->
  <!-- DM Sans: slightly geometric, confident for display/headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Full-page layout wrapper ── -->
  <div class="page">

    <!-- ── Sidebar / left panel ── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">h.</span>
        <span class="brand-name">habt</span>
      </div>

      <!-- Streak widget lives in the sidebar -->
      <div class="streak-widget">
        <div class="streak-flame">🔥</div>
        <div class="streak-info">
          <span id="streak-count" class="streak-number">0</span>
          <span class="streak-label">day streak</span>
        </div>
      </div>

      <!-- Progress ring for today -->
      <div class="today-widget">
        <p class="widget-eyebrow">Today</p>
        <div class="progress-bar-track">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
        <p id="progress-label" class="progress-label">0 of 0 done</p>
      </div>
    </aside>

    <!-- ── Main content area ── -->
    <main class="main">

      <!-- Page header -->
      <header class="page-header">
        <div>
          <h1 class="page-title">Today's habits</h1>
          <p id="date-display" class="page-date"></p>
        </div>
      </header>

      <!-- Add habit input -->
      <div class="add-habit-row">
        <div class="input-wrapper">
          <!-- Plus icon inside the input -->
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input
            type="text"
            id="habit-input"
            placeholder="Add a new habit…"
            maxlength="60"
            autocomplete="off"
          />
        </div>
        <button id="add-btn" class="btn-primary">Add habit</button>
      </div>

      <!-- Inline error message -->
      <p id="error-msg" class="error-msg hidden">Habit name can't be empty.</p>

      <!-- Habit list -->
      <ul id="habit-list" class="habit-list"></ul>

      <!-- Empty state (shown when no habits exist) -->
      <div id="empty-msg" class="empty-state">
        <div class="empty-icon">✦</div>
        <p class="empty-title">No habits yet</p>
        <p class="empty-sub">Add your first habit above and start building your streak.</p>
      </div>

      <!-- Calendar section -->
      <section class="calendar-section">
        <div class="section-header">
          <h2 class="section-title">30-day history</h2>
          <div class="calendar-legend">
            <span class="legend-chip success-chip">All done</span>
            <span class="legend-chip fail-chip">Missed</span>
            <span class="legend-chip empty-chip">No data</span>
          </div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>

    </main>
  </div><!-- /.page -->

  <script src="app.js"></script>
</body>
</html>
